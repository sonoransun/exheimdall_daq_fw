# HeIMDALL DAQ Real-Time Kernel Parameter Tuning
# Place in /etc/sysctl.d/99-heimdall-rt.conf

# Real-time scheduler optimizations
kernel.sched_rt_runtime_us=-1           # Unlimited RT runtime (disable RT throttling)
kernel.sched_latency_ns=1000000         # 1ms scheduler latency
kernel.sched_min_granularity_ns=100000  # 0.1ms minimum granularity
kernel.sched_wakeup_granularity_ns=250000  # 0.25ms wakeup granularity
kernel.sched_migration_cost_ns=50000    # 0.05ms migration cost

# Memory management optimizations
vm.swappiness=1                         # Minimal swapping
vm.dirty_ratio=5                        # Sync dirty pages at 5% RAM
vm.dirty_background_ratio=2             # Background flush at 2% RAM
vm.dirty_expire_centisecs=500           # Expire dirty pages after 5s
vm.dirty_writeback_centisecs=100        # Check dirty pages every 1s
vm.zone_reclaim_mode=0                  # Disable zone reclaim
kernel.numa_balancing=0                 # Disable NUMA balancing
vm.vfs_cache_pressure=50               # Reduce VFS cache pressure

# Network optimizations for iq_server
net.core.busy_read=50                   # Busy read timeout (microseconds)
net.core.busy_poll=50                   # Busy poll timeout (microseconds)
net.core.rmem_default=262144            # Default receive buffer (256KB)
net.core.wmem_default=262144            # Default send buffer (256KB)
net.core.rmem_max=16777216              # Max receive buffer (16MB)
net.core.wmem_max=16777216              # Max send buffer (16MB)
net.core.netdev_max_backlog=5000        # Network device backlog
net.ipv4.tcp_rmem=4096 262144 16777216  # TCP receive buffer sizes
net.ipv4.tcp_wmem=4096 262144 16777216  # TCP send buffer sizes
net.ipv4.tcp_congestion_control=bbr     # BBR congestion control
net.ipv4.tcp_low_latency=1              # Enable low-latency mode

# USB subsystem optimizations
kernel.printk=3 4 1 3                  # Reduce kernel log verbosity
kernel.panic_on_warn=0                  # Don't panic on warnings