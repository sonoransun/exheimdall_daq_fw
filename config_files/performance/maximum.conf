# HeIMDALL DAQ Maximum Performance Profile
# Aggressive optimizations for dedicated real-time systems

[performance]
profile_name = maximum
enable_cpu_affinity = 1
enable_memory_locking = 1
enable_irq_tuning = 1
enable_batched_control = 1
enable_simd_acceleration = 1

# Performance CPU governor with maximum frequency
cpu_governor = performance
cpu_frequency_min = max
cpu_frequency_max = max

# Maximum real-time priorities
rtl_daq_priority = 99
rebuffer_priority = 98
decimate_priority = 97
delay_sync_priority = 96
hw_controller_priority = 85
iq_server_priority = 90

# Aggressive memory settings
enable_huge_pages = 1
swap_disable = 1
memory_overcommit_disable = 1

# Maximum compiler optimizations
optimization_level = Ofast
enable_lto = 1
enable_pgo = 1
enable_unsafe_math = 1
enable_fast_math = 1

# Advanced features
enable_transport_optimization = 1
enable_federation_optimization = 1
enable_gpu_offload = 1
enable_fpga_offload = 1

# Kernel tuning
enable_rt_throttling_disable = 1
enable_cpu_isolation = 1
enable_nohz_full = 1
enable_rcu_nocbs = 1

# Network optimizations
enable_network_tuning = 1
enable_busy_polling = 1

# Debugging disabled for maximum performance
disable_debug_symbols = 1
disable_assertions = 1