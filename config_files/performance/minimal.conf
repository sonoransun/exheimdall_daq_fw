# HeIMDALL DAQ Minimal Performance Profile
# For low-power systems and development environments

[performance]
profile_name = minimal
enable_cpu_affinity = 1
enable_memory_locking = 0
enable_irq_tuning = 0
enable_batched_control = 1
enable_simd_acceleration = 1

# Conservative CPU governor
cpu_governor = powersave

# Basic real-time priorities (lower impact)
rtl_daq_priority = 95
rebuffer_priority = 90
decimate_priority = 85
delay_sync_priority = 80
hw_controller_priority = 75
iq_server_priority = 70

# Memory settings
enable_huge_pages = 0
swap_disable = 0

# Compiler optimizations
optimization_level = O2
enable_lto = 0
enable_pgo = 0