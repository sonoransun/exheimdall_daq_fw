# HeIMDALL DAQ Balanced Performance Profile
# Moderate optimizations suitable for most production systems

[performance]
profile_name = balanced
enable_cpu_affinity = 1
enable_memory_locking = 1
enable_irq_tuning = 1
enable_batched_control = 1
enable_simd_acceleration = 1

# Balanced CPU governor
cpu_governor = performance

# Standard real-time priorities (as implemented)
rtl_daq_priority = 99
rebuffer_priority = 94
decimate_priority = 92
delay_sync_priority = 90
hw_controller_priority = 82
iq_server_priority = 88

# Memory settings
enable_huge_pages = 1
swap_disable = 0

# Compiler optimizations
optimization_level = Ofast
enable_lto = 1
enable_pgo = 0

# Advanced features
enable_transport_optimization = 1
enable_federation_optimization = 1