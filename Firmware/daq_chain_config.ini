[meta]
ini_version = 7
config_name = kraken_default

[hw]
name = kraken5
unit_id = 0
ioo_type = 0
num_ch = 5
en_bias_tee = 0,0,0,0,0

[daq]
log_level = 5
daq_buffer_size = 262144
center_freq = 700000000
sample_rate = 2400000
gain = 0
en_noise_source_ctr = 1
ctr_channel_serial_no = 1000

[pre_processing]
cpi_size = 1048576
decimation_ratio = 1
fir_relative_bandwidth = 1.0
fir_tap_size = 1
fir_window = hann
en_filter_reset = 0

[calibration]
corr_size = 65536
std_ch_ind = 0
en_iq_cal = 1
amplitude_cal_mode = channel_power
en_gain_tune_init = 0
gain_lock_interval = 0
unified_gain_control = 0
require_track_lock_intervention = 0
cal_track_mode = 2
cal_frame_interval = 687
cal_frame_burst_size = 10
amplitude_tolerance = 2
phase_tolerance = 1
maximum_sync_fails = 10
iq_adjust_source = explicit-time-delay
iq_adjust_amplitude = 0,0,0,0
iq_adjust_time_delay_ns = 0, 0, 0, 0

[adpis]
en_adpis = 0
adpis_proc_size = 8192
adpis_gains_init = 0,0,0,0,0

[data_interface]
out_data_iface_type = shmem

[schedule]
en_schedule = 0
schedule_mode = none
; options: none, file, inline
schedule_file =
frequencies =
gains =
dwell_frames =
repeat_mode = loop
require_cal_on_hop = 1
max_cal_wait_frames = 500

[database]
en_db = 0
db_dir = _db
max_db_size_mb = 500
rotation_max_age_hours = 168
write_batch_size = 50
write_flush_interval_sec = 1.0
hw_snapshot_interval = 100

[monitoring]
en_monitoring = 0
; Syslog
en_syslog = 0
syslog_address = /dev/log
syslog_facility = daemon
syslog_min_severity = warning
; Performance metrics
en_metrics = 0
metrics_window_size = 1000
heartbeat_interval = 100
; Status endpoint
en_status_server = 0
status_server_port = 5002
; ZMQ event publisher
en_zmq_pub = 0
zmq_pub_port = 5003
; Event ring buffer for status queries
event_ring_size = 500

[offload]
; Transport selection per pipeline stage (shm | spi | pcie | usb3 | net)
rebuffer_transport = shm
decimator_transport = shm
delay_sync_transport = shm
; Compute engine selection (auto | cpu_neon | cpu_kfr | fpga | gpu)
fir_engine = auto
fft_engine = auto

[dma]
enable = 0
channel_memcpy = 7
min_transfer_size = 65536

[fpga]
enable = 0
spi_device = /dev/spidev0.0
spi_speed_hz = 62500000
gpio_drdy = 25
gpio_reset = 26
bitstream = _data_control/heimdall_fpga.bin
offload_fir = 1
offload_xcorr = 0

[gpu]
enable = 0
backend = vc4cl
offload_fft = 1
offload_fir = 0
fft_batch_size = 4

[pcie]
enable = 0
device = 0000:01:00.0
bar_index = 0
driver = xdma

[usb3]
enable = 0
vid = 0x0403
pid = 0x601f
transfer_size = 16384
num_transfers = 32

[hat_uart]
enable = 0
device = /dev/ttyAMA1
baud = 3000000
framing = cobs

[hat_i2c]
enable = 0
bus = 1
speed = 400000
retry_count = 3

[federation]
instance_id = 0
; Port offset = instance_id * port_stride
port_stride = 100
; Federation coordination
en_federation = 0
coordinator_host =
coordinator_port = 6000
peer_list =

